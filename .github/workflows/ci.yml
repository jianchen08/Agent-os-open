# ============================================================
# CI/CD 流水线 — 灵汐系统
# ============================================================
#
# 流程：代码提交 → Lint → 类型检查 → 自动测试 → 日志收集 → 结果报告 → Bug 定位
#
# 触发条件：
#   - push 到 main / develop 分支
#   - Pull Request 到 main / develop 分支
#
# 产出物：
#   - Lint / 类型检查报告
#   - 结构化测试报告（JSON + HTML）
#   - 失败用例的 Bug 定位信息
# ============================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  # 全链路真实 LLM e2e：手动触发 + 每日定时（慢、需密钥、依赖外部 LLM 网络，
  # 不阻塞 PR；隔离层 e2e 已由下方 e2e job 覆盖）
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"  # 每日 UTC 02:00（北京时间 10:00）

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  REPORT_DIR: reports

jobs:
  # ── 阶段 1: Lint + 格式检查 ──────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Ruff
        # 精确锁 ruff 版本以稳定 lint 门禁；-e ".[dev]" 补齐其余 dev 依赖。
        run: |
          pip install "ruff==0.15.20"
          pip install -e ".[dev]"

      - name: Ruff Lint
        run: |
          echo "━━━ Ruff Lint ━━━"
          mkdir -p reports
          # 先生成 JSON 报告（允许有 lint 问题时仍生成报告文件）
          ruff check src/ --config pyproject.toml --output-format=json > reports/ruff_results.json 2>/dev/null || true
          # 门禁检查：lint 错误时 CI 失败
          ruff check src/ --config pyproject.toml --output-format=github

      - name: Ruff Format Check
        run: |
          echo "━━━ Ruff Format Check ━━━"
          ruff format --check src/ --config pyproject.toml

      - name: YAML Config Syntax Check
        run: |
          echo "━━━ YAML Config Syntax (config/) ━━━"
          # agent 高频产出 config/**/*.yaml，但此前 CI 从不校验它们，
          # 坏 yaml 能直接混入仓库。这里对所有 config 下的 yaml 做语法校验。
          pip install pyyaml
          python - <<'PY'
          import sys, glob, yaml
          failures = []
          files = glob.glob("config/**/*.yaml", recursive=True) + glob.glob("config/**/*.yml", recursive=True)
          for f in files:
              try:
                  list(yaml.safe_load_all(open(f, encoding="utf-8")))
              except Exception as e:
                  failures.append(f"{f}: {e}")
          print(f"校验 {len(files)} 个 YAML 文件")
          if failures:
              print("❌ YAML 语法错误：")
              for x in failures:
                  print("  -", x)
              sys.exit(1)
          print("✅ 全部 YAML 语法正确")
          PY

      - name: Upload Lint Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: reports/ruff_results.json
          retention-days: 7

  # ── 阶段 2: 类型检查（基线锁机制）────────────────────────────
  # mypy 类型注解完善是长期技术债（见 ROADMAP），当前 470 个错误（多为 Optional
  # 链路/字符串注解引用），非崩溃级 bug。
  # 采用「基线锁」而非 continue-on-error：错误数只许减不许增，防止类型错误积累。
  # 机制：.github/mypy-baseline.txt 记录上限，scripts/check_mypy_baseline.py 比对。
  typecheck:
    name: Type Check (baseline locked)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Dependencies
        run: |
          pip install "mypy==2.1.0"
          pip install -e ".[dev]"

      - name: mypy Baseline Check
        run: |
          echo "━━━ mypy Type Check（基线锁：只许减不许增）━━━"
          python scripts/check_mypy_baseline.py

  # ── 阶段 3: 单元测试 ────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Dependencies
        # -e ".[dev]" 已含 pytest/pytest-asyncio 及全部主依赖，无需手拼列表兜底。
        run: pip install -e ".[dev]"

      - name: Create Reports Directory
        run: mkdir -p reports

      - name: Run Tests with Report Generation
        env:
          LOG_LEVEL: WARNING
          LOG_OUTPUT: console
        run: |
          echo "━━━ Running Tests ━━━"
          # 显式指定纯单元测试 + 核心功能测试目录跑。
          # 收拢原则：对应功能点的测试都要进 CI 门禁。channels（IM 通道适配）、
          # connectors（IDE/VSCode 连接器）、monitoring（健康/指标/路由）是核心
          # 功能模块，其测试从游离状态纳入本 job。
          # e2e/integration/suites 的其余部分需要真实环境/长耗时，由其它 job 覆盖。
          #
          # 跳过的红测从 .github/known-skipped-tests.txt 动态读取（基线锁机制）：
          # 该文件只能删不能加，防止红测静默扩散。修复红测后从该文件移除即可恢复门禁。
          SKIP_FILE=".github/known-skipped-tests.txt"
          DESELECT_ARGS=()
          if [ -f "$SKIP_FILE" ]; then
            while IFS= read -r line; do
              # 跳过空行和注释
              case "$line" in
                ""|\#*) continue ;;
              esac
              DESELECT_ARGS+=(--deselect "$line")
            done < "$SKIP_FILE"
            echo "跳过 ${#DESELECT_ARGS[@]} 个已知红测（见 $SKIP_FILE）"
          fi
          python -m pytest \
            tests/unit \
            tests/test_utils \
            tests/core \
            tests/tools \
            tests/triggers \
            tests/pipeline \
            tests/multimodal \
            tests/suites/core \
            tests/channels \
            tests/connectors \
            tests/monitoring \
            --tb=long \
            --no-header \
            -q \
            "${DESELECT_ARGS[@]}" \
            2>&1
          # 本次新增的附件注入测试：tests/suites/plugins 目录存在既有红测
          # （test_plugin_fixes/test_session_pipeline_downgrade），暂不整目录纳入，
          # 仅精确纳入本次新增的 multimodal_preprocessor 文本注入测试。
          python -m pytest \
            tests/suites/plugins/test_multimodal_preprocessor_text.py \
            --tb=long \
            --no-header \
            -q \
            2>&1
          # 上下文压缩链路测试：tests/suites/memory 目录存在大量既有红测
          # （test_context_compressor/test_memory_service 等，与压缩修复无关），
          # 暂不整目录纳入，仅精确纳入压缩链路相关的稳定测试作为门禁。
          # - test_restart_recompression_guard：重启后不应重复压缩已有压缩块覆盖的旧消息
          # - test_e2e_compression / test_compress_standardize_toolcalls：压缩端到端链路
          python -m pytest \
            tests/suites/memory/test_restart_recompression_guard.py \
            tests/suites/memory/test_e2e_compression.py \
            tests/suites/memory/test_compress_standardize_toolcalls.py \
            --tb=long \
            --no-header \
            -q \
            2>&1
          # 散落在 tests/ 根目录的单元/功能测试（约 127 个文件，2900+ 测试）。
          # 之前完全游离于 CI 之外，现纳入门禁。排除：
          # - 3 个 collection error（导入已删除模块）
          # - integration/e2e（需真实环境/长耗时）
          # - media/ASR/ComfyUI/PGVector（需外部服务）
          # - docker 相关（需 Docker daemon）
          # 每测试 30 秒超时，防止挂起阻塞 CI（pytest-timeout 已在 [dev] 依赖）。
          # 第 4 批次：散落测试（tests/test_*.py + integration + test_external_tools）。
          # 历史游离于 CI，部分有 pre-existing 失败（配置/接口漂移，多为
          # pytest-timeout 的 --timeout=30 打断的单测）。原先用 `|| true` 容错——
          # 完全不约束失败数增长。现改为基线锁：
          # 失败数 > .github/test-batch-baseline.txt 的基线 → CI 红（拦截增长）；
          # 失败数 ≤ 基线 → CI 绿（允许 pre-existing 持平，鼓励逐步修复后收紧）。
          # 基线初值基于真实 CI 数据（见 baseline 文件头），含 +1 余量防 Timeout 抖动。
          python scripts/check_test_batch_baseline.py --batch 4
          # 第 5 批次：tests/suites/ 下未纳入的功能套件测试（约 1000 测试）。
          # 排除 e2e（需真实 WebSocket）、llm（需真实 API key）。同样走基线锁。
          python scripts/check_test_batch_baseline.py --batch 5

      - name: Generate Test Report
        if: always()
        run: |
          echo "━━━ Report Files ━━━"
          ls -la reports/ 2>/dev/null || echo "No reports directory"

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            reports/test_report.json
            reports/test_report.html
          retention-days: 14

  # ── 阶段 3a: 时序不变量门禁（timing，§9.4）──────────────────
  # 独立 stage 专门跑 @pytest.mark.timing 用例：断言关键时序不变量
  # （事件顺序/间隔/超时边界/资源回收），破坏不变量的改动在 CI 阶段即拦截。
  # 与 test job 隔离运行，避免真实延迟影响主测试套件稳定性。
  # §9.4 铁律：不带 continue-on-error，不带 || true，失败即拦截合并。
  timing:
    name: Timing Invariants
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Dependencies
        run: pip install -e ".[dev]"

      - name: Run Timing Invariant Tests
        env:
          PYTHONPATH: src
        run: |
          echo "━━━ Timing Invariant Tests (§9.4 门禁) ━━━"
          python -m pytest -m timing \
            tests/pipeline \
            tests/unit \
            tests/soak \
            --tb=long \
            --no-header \
            -q \
            --timeout=120 --timeout-method=thread \
            2>&1

  # ── 阶段 3b: E2E 测试（WS 真实链路）─────────────────────────
  # 单独 job：需要 TestClient 启动完整 app（含 WS），较慢且重，与纯单测分离。
  # 覆盖 send/stop/信号等真实链路，防止 mock 单测漏掉的运行时 bug
  # （如 app_factory 作用域 bug：单测 mock 了内部，真实 WS 才暴露）。
  # 无测试用户凭证时 auth_token fixture 自动 skip，不会让 CI 红。
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Dependencies
        # -e ".[dev]" 已含全部主依赖（httpx/uvicorn/fastapi 均在 [project] dependencies）。
        run: pip install -e ".[dev]"

      - name: Run E2E Tests (WS real link)
        env:
          LOG_LEVEL: WARNING
          LOG_OUTPUT: console
          PYTHONPATH: src
        run: |
          echo "━━━ Running E2E Tests ━━━"
          # 暂时排除 pre-existing 失败的 test_auth/test_chat_flow（凭证 fixture 未加降级），
          # 待后续统一修复 auth fixture 后移除 ignore。先纳入本次新增的 send/stop/信号 e2e。
          python -m pytest tests/e2e \
            --tb=long \
            --no-header \
            -q \
            --ignore=tests/e2e/test_auth.py \
            --ignore=tests/e2e/test_chat_flow.py \
            2>&1

  # ── 阶段 3c: 全链路真实 LLM 复盘 e2e ────────────────────────
  # 独立 job：连真实 LLM、耗时数分钟、依赖外部网络与密钥。
  # 仅手动(workflow_dispatch)/nightly(schedule)触发，普通 push/PR 时跳过，
  # 不阻塞 PR 主链路（隔离层 e2e 已在上方 e2e job 覆盖改造正确性）。
  # 验证 B 路径：触发复盘→tags.agent_id 驱动引擎→review_agent LLM 分析→报告落盘。
  llm-e2e:
    name: LLM E2E (Review)
    runs-on: ubuntu-latest
    needs: [lint]
    # push/PR 时不跑（避免拖慢 PR、外部 LLM 抖动误红屏）
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Dependencies
        # -e ".[dev]" 已含全部主依赖（httpx/uvicorn/fastapi 均在 [project] dependencies）。
        run: pip install -e ".[dev]"

      - name: Run Review B-Path Full E2E
        env:
          LOG_LEVEL: WARNING
          LOG_OUTPUT: console
          PYTHONPATH: src
          RUN_LLM_E2E: "1"
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          echo "━━━ Running Review B-Path LLM E2E ━━━"
          # 仅跑全链路 LLM 复盘测试（带 requires_api marker，门控 RUN_LLM_E2E=1）
          # 测试内部会临时把 small tier 指向 glm-5.2，跑完还原
          python -m pytest tests/e2e/test_review_b_path_llm_e2e.py \
            -m requires_api \
            --tb=long \
            --no-header \
            -q \
            2>&1

  # ── 阶段 3d: 超时判定 + 长稳模拟（PR smoke）─────────────────
  # 用脚本化"假 LLM 流"驱动 LLMAdapter，验证两类问题：
  #   1) timeout_sim.py：单次正确性 — 8 个场景的超时判定/资源回收
  #   2) soak_runner.py：长时间渗漏 — 50 轮迭代 + RSS/任务数斜率回归
  # 全部不依赖外部 API/网络，确定性强、耗时 < 1 分钟，适合每个 PR 强阻塞。
  soak-smoke:
    name: Timeout + Soak (smoke)
    runs-on: ubuntu-latest
    needs: [lint]
    # 压力测试含时序敏感模拟（empty_stream/Timeout 决策），CI 环境下偶发 flaky。
    # 不阻塞门禁，报告仍可见；flaky 复现时单独排查。
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Dependencies
        # -e ".[dev]" 已含 pytest/pytest-asyncio、psutil（在 [project] dependencies）及全部 dev 工具。
        run: pip install -e ".[dev]"

      - name: Timeout Decision Sim (single-shot correctness)
        env:
          # 仓库根(让 `from src.xxx` 绝对导入可解析) + src/(让 `from llm` 等可解析)
          PYTHONPATH: ".:src"
        run: |
          echo "━━━ Timeout Decision Scenarios ━━━"
          python tests/soak/timeout_sim.py

      - name: Soak Run (smoke profile, 50 iters)
        env:
          PYTHONPATH: ".:src"
        run: |
          echo "━━━ Soak Smoke (50 iters) ━━━"
          mkdir -p reports
          python tests/soak/soak_runner.py \
            --profile smoke \
            --json reports/soak_smoke.json

      - name: Stuck Detection + Recovery Sim
        env:
          PYTHONPATH: ".:src"
        run: |
          echo "━━━ Stuck Detection + Recovery Scenarios ━━━"
          # 用真实的 TaskIdleTimerMixin / TaskRecoveryMixin 跑 9 个卡死/恢复
          # 场景，验证：idle 不误杀活跃任务、waiting_recovery 不死挂、
          # fail_task 异常被回调记录、启动恢复 running→suspended、计时器无风暴。
          python tests/soak/stuck_recovery_sim.py

      - name: Upload Soak Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soak-smoke-report
          path: reports/soak_smoke.json
          retention-days: 14

  # ── 阶段 3e: 长稳深跑（nightly only）─────────────────────────
  # 2000 轮 ~8 min，渗漏类问题（弱内存泄漏 / 任务累积）更易显形。
  # 仅 nightly schedule / 手动触发，不阻塞 PR。
  soak-nightly:
    name: Soak (nightly)
    runs-on: ubuntu-latest
    needs: [lint]
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Dependencies
        # -e ".[dev]" 已含 pytest/pytest-asyncio、psutil（在 [project] dependencies）及全部 dev 工具。
        run: pip install -e ".[dev]"

      - name: Soak Run (nightly profile, 2000 iters)
        env:
          PYTHONPATH: ".:src"
        run: |
          echo "━━━ Soak Nightly (2000 iters) ━━━"
          mkdir -p reports
          python tests/soak/soak_runner.py \
            --profile nightly \
            --json reports/soak_nightly.json \
            --verbose

      - name: Upload Soak Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soak-nightly-report
          path: reports/soak_nightly.json
          retention-days: 30

  # ── 阶段 3f: 前端构建 + 类型检查（门禁）─────────────────────
  # 前端整条线此前完全游离于 CI 之外（lint/类型/构建/e2e/单测均无门禁）。
  # 本 job 守住"构建不能破坏"的底线：tsc 类型检查 + vite 生产构建。
  frontend-build:
    name: Frontend Build & Typecheck
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Type Check (tsc --noEmit)
        working-directory: frontend
        run: npm run typecheck

      # vitest 单测不在此 job 跑：前端有 109 个 pre-existing 失败，由
      # frontend-test (baseline locked) job 用基线锁统一管理（只许减不许增）。
      # 此 job 曾用 continue-on-error: false 跑 npm run test，导致 109 个
      # pre-existing 失败随机让本 job 红（前几次靠 vitest 退出码差异侥幸绿）。
      # 本 job 聚焦"构建不能破坏"的底线：typecheck + production build。

      - name: Production Build
        working-directory: frontend
        run: npm run build

  # ── 阶段 3g: 前端端到端测试（Playwright，最高优先级）─────────
  # 完整服务编排：启后端(FastAPI 内存模式) + 前端(vite preview)，
  # 跑 frontend/e2e/ 下所有 spec（对应功能点的端到端验证）。
  # 功能测试优先于单测：e2e 能拦住单测 mock 漏掉的运行时回归。
  frontend-e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [lint]
    # Playwright E2E 需要真实后端+前端+Chromium 三层环境，118+ 测试约需 10-12 分钟。
    # 每次都跑，timeout 20 分钟兜底，continue-on-error 防偶发不稳定阻塞 CI。
    continue-on-error: true
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Backend Dependencies
        run: pip install -e ".[dev]"

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Build Frontend
        working-directory: frontend
        # e2e 用 vite preview 提供 UI（无 dev proxy），故构建时必须注入后端地址，
        # 否则前端 API_BASE_URL 为空、WS_BASE_URL 派生到 preview 端口，
        # 导致 e2e 登录后 WS 永久 "Reconnecting..."、聊天界面无法加载。
        env:
          VITE_API_BASE_URL: http://localhost:8988
        run: npm run build

      - name: Install Playwright Browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start Backend (FastAPI, in-memory mode)
        env:
          # sys.path 需同时含 src（让 from channels.* 可导入）和仓库根
          # （让 from src.* 可导入，源码里两种导入风格混用）
          BACKEND_PORT: "8988"
          # 内存模式：不依赖外部 Redis，CI 友好
          API_STORE_BACKEND: memory
          # 默认 admin 凭证：后端仅在配置 DEFAULT_ADMIN_PASSWORD 时才创建 admin
          # 账号（无兜底密码设计）。e2e 测试用此凭证登录，弱密码仅限 CI 测试环境。
          # 与本地 .env 的 DEFAULT_ADMIN_PASSWORD=admin123 保持一致。
          DEFAULT_ADMIN_PASSWORD: admin123
          # E2E 测试放宽限流：多个测试并发登录会触发 AUTH 限流（默认 10 次/分钟），
          # CI 环境放宽到 1000 避免误杀。生产环境不设此变量，保持默认严格策略。
          RATE_LIMIT_AUTH_MAX: "1000"
          RATE_LIMIT_DEFAULT_MAX: "2000"
        run: |
          # 不能用 `python -m`（if __name__=="__main__" 不触发，main() 不执行），
          # 也不能直接 `python src/.../app_factory.py`（sys.path[0] 变成脚本目录，
          # channels 包找不到）。用 python -c 显式设置 sys.path 后调用 main()。
          python -c "import sys; sys.path[:0]=['src','.']; from channels.websocket.app_factory import main; main()" > backend.log 2>&1 &
          echo $! > backend.pid
          # 等待后端就绪（本地实测 ~8s，预留余量到 60s）
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8988/health > /dev/null 2>&1; then
              echo "✓ 后端已就绪 (port 8988, 第 ${i}s)"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "✗ 后端未在 60s 内就绪"
              cat backend.log
              exit 1
            fi
            sleep 1
          done

      - name: Start Frontend (vite preview, port 5188)
        working-directory: frontend
        run: |
          npm run preview -- --port 5188 --host 127.0.0.1 > ../frontend.log 2>&1 &
          echo $! > ../frontend.pid
          # 等待前端就绪（最长 30s）
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5188 > /dev/null 2>&1; then
              echo "✓ 前端已就绪 (port 5188)"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "✗ 前端未在 30s 内就绪"
              cat ../frontend.log
              exit 1
            fi
            sleep 1
          done

      - name: Run Playwright E2E
        working-directory: frontend
        env:
          # playwright.config.ts 已配 baseURL localhost:5188
          BACKEND_PORT: "8988"
        run: npx playwright test

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

      - name: Dump Service Logs on Failure
        if: failure()
        run: |
          echo "═══ backend.log ═══"; cat backend.log 2>/dev/null | tail -50
          echo "═══ frontend.log ═══"; cat frontend.log 2>/dev/null | tail -50

      - name: Stop Services
        if: always()
        run: |
          kill $(cat backend.pid 2>/dev/null) 2>/dev/null || true
          kill $(cat frontend.pid 2>/dev/null) 2>/dev/null || true

  # ── 阶段 3h: 前端单元测试（基线锁机制）──────────────────────
  # vitest 有 109 个 pre-existing 失败、ESLint 有 33 个 pre-existing error，
  # 均为业务逻辑/接口变更遗留（非构建破坏）。
  # 采用「基线锁」而非放任：失败数只许减不许增，防止红测/error 积累。
  # 机制：.github/frontend-baseline.txt 记录上限，scripts/check_frontend_baseline.py 比对。
  frontend-test:
    name: Frontend Tests (baseline locked)
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Frontend Baseline Check (vitest + eslint)
        run: |
          echo "━━━ Frontend Baseline Check（基线锁：只许减不许增）━━━"
          python scripts/check_frontend_baseline.py

  # ── 阶段 4: 汇总报告 ────────────────────────────────────────
  # needs 里包含 soak-nightly/llm-e2e，但这俩在 PR 时被各自 if 跳过，
  # summary 的 if: always() 不会因它们 skipped 而失败。
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, timing, e2e, soak-smoke, soak-nightly, llm-e2e, frontend-build, frontend-e2e, frontend-test]
    if: always()
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4

      - name: CI Summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  CI/CD 流水线执行完成"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "Lint:         ${{ needs.lint.result }}"
          echo "Type Check:   ${{ needs.typecheck.result }}"
          echo "Tests:        ${{ needs.test.result }}"
          echo "Timing:       ${{ needs.timing.result }}"
          echo "E2E Tests:    ${{ needs.e2e.result }}"
          echo "Soak (smoke): ${{ needs.soak-smoke.result }}"
          echo "Soak (nightly): ${{ needs.soak-nightly.result }}"
          echo "LLM E2E:      ${{ needs.llm-e2e.result }}"
          echo "Frontend Build: ${{ needs.frontend-build.result }}"
          echo "Frontend E2E:   ${{ needs.frontend-e2e.result }}"
          echo "Frontend Unit:  ${{ needs.frontend-test.result }}"
          echo ""
          echo "产出物:"
          echo "  - lint-results/ruff_results.json"
          echo "  - test-reports/test_report.json"
          echo "  - test-reports/test_report.html"
          echo "  - soak-smoke-report/soak_smoke.json"
          echo "  - playwright-report/"
          echo ""

          # 显示 soak 摘要（如果存在）
          if [ -f soak-smoke-report/soak_smoke.json ]; then
            echo "━━━ Soak 摘要 ━━━"
            python3 -c "
          import json
          try:
              d = json.load(open('soak-smoke-report/soak_smoke.json'))
              print(f\"  iters={d['iters']}  duration={d['duration_s']:.1f}s  passed={d['passed']}\")
              print(f\"  rss_slope={d['rss_slope_mb_per_iter']:+.4f} MB/iter  task_slope={d['task_count_slope']:+.5f}/iter\")
              print(f\"  streams_created={d['streams_created']}  aclose={d['aclose_called']}  leak={d['leaked_streams']}\")
              for f in d.get('failures', []):
                  print(f\"  ❌ {f}\")
          except Exception as e:
              print(f'  解析 soak 报告失败: {e}')
          " 2>/dev/null || true
          fi

          # 显示测试报告摘要（如果存在）
          if [ -f test-reports/test_report.json ]; then
            echo "━━━ 测试报告摘要 ━━━"
            python3 -c "
          import json, sys
          try:
              data = json.load(open('test-reports/test_report.json'))
              s = data.get('summary', {})
              print(f\"  总计: {s.get('total', '?')}  通过: {s.get('passed', '?')}  失败: {s.get('failed', '?')}  跳过: {s.get('skipped', '?')}\")
              print(f\"  通过率: {s.get('pass_rate', 0):.1%}\")
              # 失败用例 bug 定位
              for case in data.get('test_cases', []):
                  if case.get('outcome') in ('failed', 'error') and case.get('bug_location'):
                      bug = case['bug_location']
                      for c in bug.get('candidates', [])[:2]:
                          print(f\"  🎯 Bug候选: {c['file']}:{c['line']} in {c['function']}\")
          except Exception as e:
              print(f'  解析报告失败: {e}')
          " 2>/dev/null || true
          fi
