mode: blacklist

rules:
  - name: "dangerous_commands"
    tools: ["*"]
    params: ["command", "cmd"]
    action: needs_approval
    patterns:
      - type: keyword
        value: "rm -rf"
      - type: keyword
        value: "del /s"
      - type: keyword
        value: "format"
      - type: keyword
        value: "mkfs"
      - type: keyword
        value: "dd if="
      - type: keyword
        value: "> /dev/sd"
      - type: keyword
        value: "chmod 777"
      - type: keyword
        value: "chown root"
      - type: keyword
        value: "shutdown"
      - type: keyword
        value: "reboot"
      - type: keyword
        value: "halt"
      - type: keyword
        value: "poweroff"
      - type: keyword
        value: "curl "
      - type: keyword
        value: "wget "
      - type: keyword
        value: "nc -"
      - type: keyword
        value: "netcat "
      - type: keyword
        value: "ncat "
      - type: keyword
        value: "ssh "
      - type: keyword
        value: "scp "
      - type: keyword
        value: "rsync "
      - type: keyword
        value: "iptables"
      - type: keyword
        value: "pip install"
      - type: keyword
        value: "npm install"
      - type: keyword
        value: "yarn add"
      - type: keyword
        value: "apt-get install"
      - type: keyword
        value: "yum install"
      - type: keyword
        value: "brew install"
      - type: keyword
        value: "python -c"
      - type: keyword
        value: "python3 -c"
      - type: keyword
        value: "node -e"
      - type: keyword
        value: "perl -e"
      - type: keyword
        value: "ruby -e"
      - type: keyword
        value: "php -r"
      - type: keyword
        value: "reg add"
      - type: keyword
        value: "reg delete"
      - type: keyword
        value: "regedit"
      - type: keyword
        value: "crontab"
      - type: keyword
        value: "schtasks"
      - type: keyword
        value: "at "
      - type: keyword
        value: "export PATH"
      - type: keyword
        value: "set PATH"
      - type: keyword
        value: "LD_PRELOAD"
      - type: keyword
        value: "no-preserve-root"
      # CMD 风格 nul 重定向（Git Bash/Linux 下会创建名为 nul 的垃圾文件）
      # 基础检查层已对所有模式软拦截；此处为非隔离模式规则层第二道记录
      - type: keyword
        value: ">nul"
      - type: regex
        value: "\\brm\\s+(-\\w*r\\w*f\\w*|-\\w*f\\w*r\\w*)"
      - type: regex
        value: "\\bdel\\s+/[sq]\\b"
      - type: regex
        value: "\\bdd\\s+.*of=/dev/"
      - type: regex
        value: "\\bsudo\\s+(rm|dd|mkfs|format|fdisk|parted)\\b"
      - type: regex
        value: "\\|\\s*(ba)?sh\\b"
      - type: regex
        value: "(bash|sh|nc|ncat)\\s+-[ep]\\s"
      - type: regex
        value: "\\b(eval|exec)\\s*\\("
      - type: regex
        value: "(Remove-Item|Invoke-WebRequest|Start-Process)"
      - type: regex
        value: "\\b(fdisk|parted|mkfs|mount\\s+/dev/)\\b"

  - name: "protected_paths"
    tools: ["*"]
    params: ["path", "file_path", "directory", "dest", "target", "output_path", "working_dir"]
    action: block
    patterns:
      - type: keyword
        value: "/etc/passwd"
      - type: keyword
        value: "/etc/shadow"
      - type: keyword
        value: "/etc/sudoers"
      - type: keyword
        value: "/etc/ssh"
      - type: keyword
        value: "/root/.ssh"
      - type: keyword
        value: "/home/.ssh"
      - type: keyword
        value: "C:\\Windows\\System32"
      - type: keyword
        value: "C:\\Windows\\SysWOW64"
      - type: keyword
        value: "/System/Library"
      - type: keyword
        value: "/usr/lib/systemd"
      - type: keyword
        value: "/boot/"
      - type: keyword
        value: "/efi/"

  - name: "ssrf_protection"
    tools: ["fetch", "web"]
    params: ["url"]
    action: block
    patterns:
      - type: keyword
        value: "localhost"
      - type: keyword
        value: "127.0.0."
      - type: keyword
        value: "0.0.0.0"
      - type: keyword
        value: "169.254."
      - type: keyword
        value: "[::1]"
      - type: keyword
        value: "file://"
      - type: keyword
        value: "gopher://"
      - type: keyword
        value: "dict://"
      - type: regex
        value: "10\\.\\d{1,3}\\.\\d{1,3}\\.\\d{1,3}"
      - type: regex
        value: "192\\.168\\.\\d{1,3}\\.\\d{1,3}"
      - type: regex
        value: "172\\.(1[6-9]|2\\d|3[01])\\.\\d{1,3}\\.\\d{1,3}"

  - name: "high_risk_operations"
    tools: ["*"]
    params: ["command", "cmd"]
    action: needs_approval
    patterns:
      - type: keyword
        value: "sudo "
      - type: keyword
        value: "runas "
      - type: keyword
        value: "su -"
      - type: keyword
        value: "docker run"
      - type: keyword
        value: "docker exec"
      - type: keyword
        value: "kubectl apply"
      - type: keyword
        value: "kubectl delete"

  - name: "subprocess_git_only"
    tools: ["resource_merge"]
    params: ["command"]
    action: block
    patterns:
      - type: regex
        value: "^(?!git\\s).+"

  # ── 宿主路径访问：命令含 Windows 盘符路径时强制审批 ──
  # bash_execute 被 isolation_guard 路由到 host 执行（容器内无宿主路径），
  # 此时必须弹审批，不能走下面的 safe_commands 白名单（否则 ls D:/... 会被直接放行）。
  # 正则 [A-Za-z]:[\\/] 匹配 D:/、D:\、C:\Users 等 Windows 盘符绝对路径。
  - name: "host_path_access"
    tools: ["bash_execute"]
    params: ["command", "working_dir"]
    action: needs_approval
    patterns:
      - type: regex
        value: "[A-Za-z]:[\\\\/]"

  # ── 参数白名单：安全命令直接放行，不弹审批 ──
  # 危险工具（如 bash_execute）的参数如果命中白名单，视为安全操作直接放行。
  # 用正则前缀匹配：命令以这些开头 = 安全。
  - name: "safe_commands"
    tools: ["bash_execute"]
    params: ["command", "cmd"]
    action: allow
    patterns:
      - type: regex
        value: "^\\s*(ls|cat|echo|pwd|whoami|date|wc|head|tail|grep|find|which|file|stat|du|df|env|printenv)\\s"
      - type: regex
        value: "^\\s*(git status|git log|git diff|git show|git branch)\\s"
      - type: regex
        value: "^\\s*(python --version|node --version|npm --version)\\s*"
      - type: regex
        value: "^\\s*(pip list|pip show)\\s"
