- name: task_submit
  description: '任务提交工具。将任务提交给指定的 Agent 执行，或创建容器任务组织复杂工作。

    task_scope 参数决定任务类型：
    - non_container（默认）：实际执行的任务，必须指定 target_type 和 target_id
    - container：容器任务，用于组织复杂长期任务的子任务链，不能指定 target_type 和 target_id

    【核心功能】

    - 将任务分配给合适的 Agent 执行（non_container）

    - 创建容器任务组织复杂项目（container）

    - 为任务配置验收标准，确保执行结果可验证

    - 支持立即执行、排队等待、计划执行三种模式


    【示例 - 普通任务】

    {"target_type": "agent", "target_id": "general_agent", "goal": {"title": "实现用户登录"},
    "acceptance_criteria": {"file_check": {"input_params": {"path": "src/auth/login.py"}}}}

    【示例 - 容器任务】

    {"task_scope": "container", "goal": {"title": "开发Roguelike游戏"}, "needs_preparation": true}'
  category: task
  level: l1_l2_only
  requires_approval: false
  dangerous_operations: []
  tags:
  - task
  - submit
- name: task_manage
  description: 任务管理工具：用于查询和控制任务状态。支持操作：get(查询详情)、list(列出列表)、update(更新状态)、status(状态概览)、pause(暂停)、resume(继续)、cancel(取消)、retry(重试)、delete(删除)。权限：L1可管理所属会话的所有任务，L2只能管理自己提交的子任务。
  category: task
  level: system
  requires_approval: false
  dangerous_operations: []
  tags:
  - task
  - management
  - L1
  - L2
  - status
  - control
- name: task_evaluate
  description: 任务评估工具：用于评估任务的评估指标是否满足。支持两种模式：evaluate_single(评估单个指标，增量模式，需提供metric_id)、auto_complete(自动评估所有指标，推荐)。完成任务执行后使用，验证是否满足验收标准。注意：任务未完成时先执行任务；无验收标准的任务无法评估；指标重试5次后任务会被标记为blocked。
  category: task
  level: system
  requires_approval: false
  dangerous_operations: []
  tags:
  - task
  - evaluate
  - metric
  - completion
- name: human_interaction
  description: 与用户交互工具。选择模式：弹出选择框等待用户决定；对话模式：跳转到对话标签页。
  category: system
  level: all
  requires_approval: false
  dangerous_operations: []
  tags:
  - interaction
  - human
  - approval
  - conversation
