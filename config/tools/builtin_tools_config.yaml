tools:
- name: file_read
  description: 读取文件内容、列出目录结构。适用场景：需要读取文件内容、浏览目录结构。不适用场景：需要写入文件（使用 file_write）、执行代码（使用
    bash_execute）、搜索文件内容（使用 enhanced_search）、搜索文件名（使用 enhanced_search 的 filename 模式）。注意：路径访问受
    base_path 限制；大文件读取可能影响性能。fields 参数：读取 YAML/JSON 文件的特定字段，节省 token。例如：fields=['id',
    'name'] 只返回这两个字段。
  category: file
  level: user
  requires_approval: false
  dangerous_operations:
  - read:/etc/
  - read:/sys/
  - read:C:\Windows\
  tags:
  - file
  - io
  - read
- name: file_write
  description: 创建、写入、编辑文件内容。支持 write(全量写入/替换行)、search_replace(搜索替换)、insert(插入)、delete_lines(删除行)、append(追加)。适用场景：创建新文件、全量覆盖写入、修改特定行、搜索替换内容、插入内容、删除行、追加内容。不适用场景：仅读取文件（使用
    file_read）、列出目录（使用 file_read）。注意：write 会覆盖已有内容；行号从 1 开始；默认创建 .bak 备份；操作具有原子性。
  category: file
  level: user
  requires_approval: false
  dangerous_operations:
  - write:/etc/
  - write:/sys/
  - write:C:\Windows\
  - 'delete_lines:'
  tags:
  - file
  - edit
  - write
  - replace
  - insert
  - delete
- name: bash_execute
  description: 执行 Shell 命令，支持长时间运行进程（30秒超时+回调机制）、交互式输入（确认/密码）和隔离环境执行。适用场景：执行系统命令（ls/cat/grep/pip/npm等）、运行脚本、查看系统信息、安装依赖、编译构建项目。不适用场景：仅需读取文件（使用file_read）、仅需搜索文件（使用code_search）、危险操作（rm
    -rf/format/dd等）、长期运行服务。注意事项：命令执行默认30秒超时，超时后触发回调机制；危险命令会被安全检查拦截；Windows和Linux/Mac命令语法可能不同；需要审批才能执行；长时间运行命令会保存日志到logs/bash/目录；敏感输入会被自动掩码处理。
  category: system
  level: user
  requires_approval: true
  dangerous_operations:
  - rm -rf
  - format
  - del /q
  - shutdown
  - reboot
  - mkfs
  - dd if=
  - '> /dev/sd'
  - curl
  - wget
  tags:
  - bash
  - shell
  - command
  - dangerous
  - interactive
  - long-running
- name: enhanced_search
  description: 在文件中搜索文本、代码或文件名。支持内容搜索（集成ripgrep，性能提升10-100倍）和文件名搜索。适用于查找函数/类/变量定义、TODO注释、特定文件名等场景。默认不区分大小写，结果限制100条。文件名搜索不支持正则表达式。
  category: search
  level: user
  requires_approval: false
  dangerous_operations: []
  tags:
  - search
  - code
  - ripgrep
  - performance
  - filename
- name: fetch
  description: Web 操作工具：执行 HTTP 请求和网页抓取。支持 GET/POST 请求和网页内容抓取。使用场景：调用外部 API；抓取网页内容；发送
    HTTP 请求获取远程数据。限制：请求默认 30 秒超时；响应大小限制为 10MB；某些域名可能被安全策略阻止。
  category: web
  level: user
  requires_approval: false
  dangerous_operations: []
  tags:
  - web
  - http
  - scrape
- name: web_search
  description: 搜索互联网信息，基于 mcp-webgate 实现。支持 SearXNG 多引擎聚合搜索，自动 BM25 重排序、HTML 去噪、URL 去重，返回高质量结果。提供三种搜索模式：完整搜索（搜索+抓取+清洗+排序）、摘要模式（仅搜索结果摘要）、内容提取（提取指定URL的页面内容）。
  category: search
  level: user
  requires_approval: false
  dangerous_operations: []
  tags:
  - web
  - search
  - internet
  - mcp
- name: resource_search
  description: 搜索系统内 Agent、工具、Skill 资源。空结果是正常的，不要重复搜索。simple=列出匹配资源；detailed=按精确名称加载资源（tool会动态注入，支持逗号分隔批量）。
  category: search
  level: system
  requires_approval: false
  dangerous_operations: []
  tags:
  - search
  - resource
  - system
