# -*- coding: utf-8 -*-
# 工具全局配置
# 定义缓存策略和权限策略

# ============================================
# 工具缓存配置
# ============================================
tool_cache:
  # 全局缓存开关
  enabled: true
  # 默认 TTL（秒）
  default_ttl: 300

# ============================================
# 权限策略配置
# ============================================
permission_policies:
  # 系统管理员：可以执行所有操作
  admin:
    can_approve: true
    auto_approve_tools: ["*"]

  # 开发者：需要审批危险操作
  developer:
    can_approve: false
    auto_approve_tools:
      - "task_manage"
      - "task_submit"
      - "task_evaluate"
      - "memory"
      - "file_read"
      - "file_write"
      - "enhanced_search"
      - "fetch"
      - "web_search"
      - "resource_search"
    require_approval_tools:
      - "bash_execute"

  # 只读用户：只能执行安全操作
  readonly:
    can_approve: false
    auto_approve_tools:
      - "task_manage"
      - "memory"
      - "file_read"
      - "enhanced_search"
      - "fetch"
      - "web_search"
      - "resource_search"
    require_approval_tools:
      - "file_write"
      - "bash_execute"
