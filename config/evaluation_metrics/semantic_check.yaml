# 内容质量评估指标
# 使用独立 LLM Agent 对任意内容进行质量评估
# 不局限于特定内容类型（代码/文档/方案/报告），通过评估标准灵活适配

id: semantic_check
name: 质量评估
description: |
  对任务产出进行质量评估，重点评估「验证动作是否足以证明需求目标已达成」。评估维度：实际修改是否完整、验证工具是否恰当、验证数据是否具体、综合是否足以证明目标达成。不仅检查报告文字，更检查实质性的修改和验证证据。

# ===== 评估器配置 =====
evaluator_id: evaluator_agent
evaluator_type: agent

default_config:
  check: semantic

# ===== 评估指令 =====
# 核心评估逻辑：从"检查报告覆盖度"改为"检查验证动作是否足以证明需求目标已达成"
evaluation_instruction: |
  你是一个严格的质量评估者。你的评估不是检查报告写得漂不漂亮，而是检查任务产出是否真正解决了问题。

  ## 评估重点（按优先级排序）

  1. **实际修改了什么**：检查是否有具体的代码/配置文件变更记录，而非仅停留在分析/建议层面。
     - ✅ "修改了 src/auth/login.py 的 check_password 函数，增加盐值比对"
     - ❌ "发现认证模块存在安全隐患，建议加强密码验证"

  2. **用什么工具做了什么验证**：检查是否有明确的验证工具和验证动作。
     - ✅ "使用 pytest 运行 tests/test_auth.py，12 个用例全部通过"
     - ❌ "已验证功能正常"（无工具、无动作、无数据）

  3. **验证结果是否具体量化**：检查验证数据是否具体，而非模糊声称。
     - ✅ "测试用例 12/12 通过，覆盖率 95%，API 响应时间 <200ms"
     - ❌ "测试通过"（无数据）

  4. **验证动作是否足以证明目标达成**：综合以上三点，判断这些验证是否能充分证明原始需求目标已达成。
     - 如果需求是"修复登录超时bug"，验证了"登录功能正常"但没验证"超时场景已修复" → 不通过
     - 如果需求是"优化API性能"，验证了"响应时间从500ms降到200ms"且有测试数据 → 通过

  ## 判定标准

  - **通过**：每个需求目标都有对应的实际代码修改 + 具体工具验证 + 量化验证数据，验证充分覆盖需求场景
  - **不通过**：存在以下任一情况：
    - 只有分析/建议而无实际代码修改（走过场）
    - 验证动作模糊，无具体工具和数据（糊弄）
    - 验证场景未覆盖核心需求（遗漏）
    - 报告写得很漂亮但缺乏实质验证证据（形式主义）

  ## 特别注意

  - 不要被报告的格式和文字质量迷惑，关注实质内容
  - 一份简短但有具体验证数据的报告，优于一份冗长但只有分析建议的报告
  - 如果报告声称"已修复"但无法从验证数据中确认修复效果，应判定为不通过

  ## 需求类型→验证方式映射

  评估者应检查任务使用的验证方式是否与需求类型匹配。不同类型的需求有各自推荐的验证方式，用错验证方式（如前端功能只跑了单元测试没有浏览器测试）应判定为不通过。

  | 需求类型 | 推荐验证方式 | 示例 |
  |----------|-------------|------|
  | 前端 UI 功能（按钮/交互/显示） | 浏览器测试（playwright_test）+ 快照对比 | 点击按钮后页面跳转正确、表单提交成功 |
  | 前端渲染/样式 | 视觉回归测试 + 组件测试 | 渲染结果截图对比、CSS属性验证 |
  | 后端 API | pytest + API 端点测试 | HTTP请求返回正确状态码和数据 |
  | 代码规范/质量 | 静态检查工具（eslint/mypy/flake8） | 无 lint 错误、类型注解完整 |
  | 性能优化 | 基准测试 + 性能指标对比 | 响应时间从Xms降到Yms |
  | Bug修复 | 复现测试 + 修复后回归测试 | Bug场景不再复现 + 原有功能不受影响 |
  | 配置/架构 | 配置验证 + 集成测试 | 配置加载正确、模块间协作正常 |

  **验证方式匹配检查要点：**

  1. **识别需求类型**：从任务目标和验收标准中判断需求属于上述哪种类型
  2. **检查验证方式**：查看任务实际使用了什么验证工具和验证方法
  3. **判定匹配度**：验证方式是否足以证明该类型需求的达成
     - 前端 UI 功能只跑了单元测试（如 Jest/pytest），没有浏览器级测试 → 不通过
     - 后端 API 只做了手动 curl 测试，没有自动化测试用例 → 不通过
     - Bug修复只验证了修复点，没有回归测试 → 不通过
     - 性能优化只有主观感受，没有量化指标对比 → 不通过
  4. **综合判定**：即使每种验证方式都正确，仍需判断整体验证是否充分覆盖了所有需求场景

# ===== 评估判断标准 =====
expect:
  conditions:
    - field: "passed"
      operator: "is_true"
  logic: "and"
  pass_message: "质量评估通过"
  fail_message: "质量评估未通过"

# ===== 输入参数定义 =====
input_schema:
  type: object
  properties:
    content:
      type: string
      description: "要评估的内容（可选，不传时由评估Agent自行获取）"
    criteria:
      type: string
      description: "评估要求描述（可选，用自然语言描述即可）"

# ===== 使用边界 =====
when_to_use:
  - 评估文档/报告的结构完整性和内容质量
  - 评估方案的逻辑性和可行性
  - 评估代码的可读性和设计合理性
  - 评估翻译质量、摘要质量
  - 需要获取具体的改进建议
  - 任何需要"理解内容 + 判断质量"的场景
when_not_use:
  - 只需要格式验证（使用 format_valid）
  - 只需要验证功能是否实现（由 function_verifier_agent 在流程中执行）
  - 只需要简单的是/否判断（使用 Tool 类型指标）
examples:
  - params:
      criteria: "报告应包含摘要、背景、方法、结论四个章节，内容需要有足够的深度"
    description: "评估调研报告质量（不传content，由评估Agent自行获取）"
  - params:
      content: "def calculate_total(items): ..."
      criteria: "代码可读性、设计合理性、命名规范"
    description: "评估代码可读性"
  - params: {}
    description: "最简用法，不传任何参数，评估Agent根据任务目标自动评估"
caveats:
  - 评估质量取决于任务目标描述是否清晰
  - LLM 判断有不确定性，评分仅供参考
  - 评估的是内容质量，不验证功能正确性（功能验证由 function_verifier_agent 在流程中执行）
  - 长文本可能需要分段评估

# ===== 依赖关系 =====
is_red_line: false
default_weight: 1.0
level: 3
includes:
  - file_check
requires: []

