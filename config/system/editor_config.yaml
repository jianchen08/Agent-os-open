version: "1.0"
default_editor: "builtin"
mappings:
  ".py": "ide"
  ".ts": "ide"
  ".tsx": "ide"
  ".js": "ide"
  ".jsx": "ide"
  ".java": "ide"
  ".go": "ide"
  ".rs": "ide"
  ".cpp": "ide"
  ".c": "ide"
  ".h": "ide"
  ".cs": "ide"
  ".rb": "ide"
  ".php": "ide"
  ".swift": "ide"
  ".kt": "ide"
  ".md": "builtin"
  ".txt": "builtin"
  ".json": "builtin"
  ".yaml": "builtin"
  ".yml": "builtin"
  ".toml": "builtin"
  ".xml": "builtin"
  ".html": "builtin"
  ".css": "builtin"
  ".scss": "builtin"
  ".png": "builtin"
  ".jpg": "builtin"
  ".jpeg": "builtin"
  ".gif": "builtin"
  ".svg": "builtin"
  ".webp": "builtin"
  ".pdf": "external"
editors:
  ide:
    name: "外部IDE"
    description: "通过连接器在外部IDE中打开（VSCode等）"
    fallback: "builtin"
  builtin:
    name: "内置编辑器"
    description: "使用内置代码查看器或预览器"
  external:
    name: "系统默认"
    description: "使用系统默认应用程序打开"
    fallback: "builtin"
