# 任务管理模块 UI Schema 配置
# 提供任务树的查询与展示能力

config_id: task-manager
name: 任务管理
is_active: true
description: 任务树管理模块，提供项目与任务的可视化树形展示

ui:
  # ========== A. 身份信息 ==========
  identity:
    id: task-manager
    name: 任务管理
    version: "1.0.0"
    category: builtin
    description: 任务树管理模块
    icon: "📋"
    author: agent-os-team
    tags:
      - task
      - tree
      - management

  # ========== B. 交互动作 ==========
  actions:
    - id: get_task_tree
      name: 获取任务树
      type: query
      label: 任务树
      api: /api/v1/projects/tree

    - id: pause_project
      name: 暂停项目
      type: command
      label: 暂停
      api: /api/v1/projects/{projectId}/pause

    - id: resume_project
      name: 恢复项目
      type: command
      label: 恢复
      api: /api/v1/projects/{projectId}/resume

    - id: toggle_auto_execute
      name: 切换自动执行
      type: command
      label: 自动执行
      api: /api/v1/projects/{projectId}/auto-execute

  # ========== C. 渲染配置 ==========
  rendering:
    # 聊天交互 - 任务状态卡片
    chat:
      - type: status_card
        props:
          title: 任务状态
          metrics:
            - label: 进行中
              key: running
              unit: 个
            - label: 已完成
              key: completed
              unit: 个
            - label: 失败
              key: failed
              unit: 个
        dataSource: "task-manager://statistics"

      - type: progress
        props:
          label: 总体进度
          showPercentage: true
          color: "#1890ff"
        dataSource: "task-manager://progress"
        refreshInterval: 5000

    # 渲染空间 - 任务树
    spaces:
      - space: workspace
        widget: tree
        props:
          title: 任务管理
          showStatus: true
          showProgress: true
          expandLevel: 2
          nodeIconField: icon
          nodeTitleField: title
          nodeStatusField: status
          nodeChildrenField: children
        dataSource: "task-manager://tree"
        layout:
          width: "100%"
          height: "100%"
          resizable: true

    # Dock 栏配置
    dock:
      icon: "📋"
      label: 任务
      indicator: dot
      indicatorColor: "bg-blue-500"

  # ========== D. 客户端适配 ==========
  clients:
    requiredSpaces:
      - workspace
    requiredWidgets:
      - tree
    minClientVersion: "1.0.0"
    fallback:
      widget: table
      space: chat
