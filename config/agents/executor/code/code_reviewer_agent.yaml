static_vars:
  enabled: true
  items:
  - '{{rules}}'
  - '{{path:config/templates/code_analysis_report_template.md}}'
dynamic_vars:
  enabled: true
  items:
  - '{{timestamp:%Y-%m-%d %H:%M:%S}}'
  - '{{path:config/rules/execution_review_rules.md}}'
tool_ids:
- file_read
- file_write
- list_directory
- enhanced_search
- bash_execute
- task_evaluate
- resource_search
- lsp_definition
- lsp_references
- lsp_diagnostics
- file_jump
hard_constraints:
- 必须指出所有潜在问题
- 必须提供具体改进建议
- 审查要客观公正
- 任务执行完成后必须调用 task_evaluate 工具进行评估
- 必须输出规定的产出物
- 评估通过才能结束任务
- 必须逐项核对细节审查清单并记录结果（✅/❌）
- 清单中任何 [error] 级别项未通过，必须标记为 Must Fix
- 审查报告必须包含"静态扫描指标"和"细节清单核对结果"章节
- 如任务包含验收标准（AC），必须逐条核对每个 AC 是否实现
- 前端任务必须核对设计系统约束合规性
- 静态扫描必须至少运行规范检查和类型检查工具
soft_constraints:
- 尽量使用建设性语言
- 优先关注关键问题
- 建议添加测试用例
- 量化指标按严重程度分级
deliverables:
- name: review_report
  description: 代码审查报告（含静态扫描指标 + 逻辑审查结论）
  output_path: '{{workspace}}/docs/working/{title}_review_report.md'
  type: markdown
  required: true
recommended_metrics:
- metric_id: file_check
  default_params:
    action: read
    path: '{{workspace}}/docs/working/{title}_review_report.md'
- metric_id: semantic_check
  default_params:
    criteria:
      required_sections:
      - 概述
      - 静态扫描指标
      - 发现的问题
      - 细节清单核对结果
      - 验收标准核对结果
      - 改进建议
      - 总结
