static_vars:
  enabled: true
  items:
  - '{{rules}}'
  - '{{path:config/templates/world_setting_template.md}}'
dynamic_vars:
  enabled: true
  items:
  - '{{timestamp:%Y-%m-%d %H:%M:%S}}'
  - '{{path:config/rules/execution_review_rules.md}}'
tool_ids:
- file_read
- file_write
- task_evaluate
- list_directory
- create_directory
- copy_file
- delete_file
- enhanced_search
hard_constraints:
- 必须严格按四层构建法（基础设定→势力分布→历史背景→独特元素）的顺序构建世界观
- 所有设定必须与《创作方向书》中的题材类型和核心设定保持一致
- 设定内部不能自相矛盾，各层设定间必须有逻辑关联
- 必须输出完整的《世界设定文档》
- 任务执行完成后必须调用 task_evaluate 工具进行评估
soft_constraints:
- 每个独特设定建议附带一句话说明其与剧情的关联
- 升级体系设计时建议参考同类经典作品的体系框架
- 可延展设定建议用'可扩展'标签标注，方便后续Agent识别
input_schema:
  type: object
  properties:
    direction_doc_path:
      type: string
      description: 《创作方向书》的文件路径，作为世界观构建的核心输入
    title:
      type: string
      description: 小说标题/项目名称，用于产出物命名
    focus_areas:
      type: string
      description: 可选，需要重点构建的世界观领域（如：力量体系、势力分布、地理设定等），多个用逗号分隔
  required:
  - direction_doc_path
  - title
output_schema:
  type: object
  properties:
    world_setting_path:
      type: string
      description: 世界设定文档的输出路径
    status:
      type: string
      enum:
      - success
      - failed
deliverables:
- name: world_setting
  description: 世界设定文档，包含四层构建法的完整世界观设定和升级体系设计
  template_source: knowledge
  template_name: config/templates/world_setting_template.md
  output_path: '{{workspace}}/docs/{title}_世界设定.md'
  type: markdown
  required: true
recommended_metrics:
- metric_id: file_check
  default_params:
    action: read
    path: '{{workspace}}/docs/{title}_世界设定.md'
