hard_constraints:
- 必须按五层流水线顺序执行：策划→设定→情节→写作→审核，不得跳过任何层
- 每个检查点必须执行并记录结果，检查点不可跳过
- 里程碑门控检查点（CP-1/CP-2/CP-4/CP-6）必须获得人类确认才能继续
- 设定锁定后基础设定不可修改，除非走异常上报流程
- 一致性检查发现严重问题必须修复后再继续写作
- 自动修复最多2轮，失败后必须异常上报人类
- 质量审核最多重试3次，仍不通过则报告给上级
- 所有创作产出必须保存为markdown格式
- 下级 Agent 映射表已列出所有团队成员，提交任务时直接用映射表中的 Agent ID，禁止用 resource_search 搜索 Agent
- 不读取子任务产出物的具体内容，只通过 task_manage 跟踪状态
- 不做快照合并和changelog处理，状态存档由写作Agent自行管理
- 上下文继承约束（L1/L2通用）：当新任务与已有任务有上下文关联（补充审查、延续执行、换方案但保留产出等）时，必须使用 task_submit 的 inherit_pipeline_from 和/或 inherit_workspace_from 参数继承对应的管道和/或工作空间。禁止在有上下文关联时不使用继承而创建全新隔离的工作空间，这会导致上下文断裂
- L2 自做与派发判断标准：编排报告、一致性检查结论、质量审核判定属于编排职责产出，必须自己做，禁止派发给 L3。章节写作、设定构建、情节编排属于具体执行产出，向下派发给 L3 执行。判断标准：产出是报告/结论 → 自己做；产出是创作内容 → 派发
soft_constraints:
- 优先保持创作风格的连贯性
- 写作层启动前必须完成文风锚定，确保有参考原文可用
- 章节间适当控制信息密度和节奏
- 鼓励在合适节点铺设伏笔
- 同层无依赖任务并行提交
- 给Agent传递路径引用而非内容，让Agent自行 file_read
rule_reinforcement:
  enabled: true
  include_hard_constraints: true
  include_soft_constraints: false
  include_system_prompt_rules: true
  extraction_markers:
  - 【重要】
  - 【必须】
  - 必须
  custom_rules: []
  template: '--- 【执行前请再次确认以下规则】 {rules} --- '
  max_rules: 10
deliverables:
- name: novel_orchestration_report
  description: 小说创作编排报告，包含创作流程记录、各阶段产出索引、检查点执行记录、质量评估汇总
  output_path: '{{workspace}}/docs/working/novel_orchestration_report.md'
  type: markdown
  required: true
- name: novel_progress
  description: 创作进度文件，记录当前阶段、已完成章节、检查点状态
  output_path: '{{workspace}}/docs/working/novel_progress.yaml'
  type: yaml
  required: true
recommended_metrics:
- metric_id: file_check
  default_params:
    action: read
    path: '{{workspace}}/docs/working/novel_orchestration_report.md'
version: 5.0.0
is_active: true
status: active
max_iterations: 250
max_reminders: 8
timeout_seconds: 7200
plugins:
  disabled: []
  enabled:
    task_reminder:
      max_reminders: 8
      cooldown_seconds: 300
tags:
- orchestrator
- creative
- novel
- L2
metadata:
  author: System
  created_at: '2026-05-22'
  updated_at: '2026-05-23'
  capabilities:
  - novel_creation_orchestration
  - creative_workflow_management
  - multi_agent_coordination
  - quality_gate_control
  - checkpoint_gating
  - progress_tracking
  - auto_recovery
